openapi: 3.0.3
info:
  title: RepoMemory API
  version: 0.2.0
  description: Contract for currently implemented RepoMemory API endpoints.
servers:
  - url: http://localhost:8080
tags:
  - name: Health
  - name: Identity
  - name: Organizations
  - name: GitHub
  - name: Repositories
  - name: Jobs
  - name: Search
paths:
  /health:
    get:
      tags:
        - Health
      operationId: getHealth
      summary: Health check
      responses:
        "200":
          description: Healthy API response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /v1/me:
    get:
      tags:
        - Identity
      operationId: getMe
      summary: Get current authenticated user
      security:
        - MockUserHeader: []
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
  /v1/organizations:
    get:
      tags:
        - Organizations
      operationId: listOrganizations
      summary: List organizations accessible by current user
      security:
        - MockUserHeader: []
      responses:
        "200":
          description: Organizations for the current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationListResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags:
        - Organizations
      operationId: createOrganization
      summary: Create organization and owner membership for current user
      security:
        - MockUserHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrganizationRequest"
      responses:
        "201":
          description: Organization created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/organizations/{orgId}:
    get:
      tags:
        - Organizations
      operationId: getOrganization
      summary: Get organization detail for current user
      security:
        - MockUserHeader: []
      parameters:
        - name: orgId
          in: path
          required: true
          description: Organization identifier
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Organization detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/github/connect/start:
    post:
      tags:
        - GitHub
      operationId: startGitHubConnect
      summary: Start GitHub OAuth connection flow
      security:
        - MockUserHeader: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartGitHubConnectRequest"
      responses:
        "200":
          description: OAuth authorize URL ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartGitHubConnectResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/github/callback:
    get:
      tags:
        - GitHub
      operationId: completeGitHubCallback
      summary: Complete GitHub OAuth callback and persist account
      security:
        - MockUserHeader: []
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OAuth callback completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitHubCallbackSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "502":
          $ref: "#/components/responses/UpstreamError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/github/repositories:
    get:
      tags:
        - GitHub
      operationId: listGitHubRepositories
      summary: List GitHub repositories accessible by the connected account
      security:
        - MockUserHeader: []
      responses:
        "200":
          description: GitHub repositories available for import
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitHubRepositoriesListResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "502":
          $ref: "#/components/responses/UpstreamError"
  /v1/github/repositories/import:
    post:
      tags:
        - GitHub
      operationId: importGitHubRepositories
      summary: Import selected GitHub repositories into an organization
      security:
        - MockUserHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportGitHubRepositoriesRequest"
      responses:
        "200":
          description: Imported repository records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportGitHubRepositoriesResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/jobs/{jobId}:
    get:
      tags:
        - Jobs
      operationId: getJob
      summary: Get one background job by id
      security:
        - MockUserHeader: []
      parameters:
        - name: jobId
          in: path
          required: true
          description: Job identifier
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Job record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/memory/search:
    get:
      tags:
        - Search
      operationId: searchMemory
      summary: Search memory entries by title and summary
      security:
        - MockUserHeader: []
      parameters:
        - name: q
          in: query
          required: false
          description: Search query
          schema:
            type: string
        - name: organizationId
          in: query
          required: true
          description: Organization identifier
          schema:
            type: string
            format: uuid
        - name: repositoryId
          in: query
          required: false
          description: Optional repository identifier within the organization
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Search results from persisted memory entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemorySearchResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/organizations/{orgId}/repositories:
    get:
      tags:
        - Repositories
      operationId: listOrganizationRepositories
      summary: List imported repositories for an organization
      security:
        - MockUserHeader: []
      parameters:
        - name: orgId
          in: path
          required: true
          description: Organization identifier
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Imported repositories for organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationRepositoriesResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/repositories:
    get:
      tags:
        - Repositories
      operationId: listRepositories
      summary: List imported repositories for current user
      security:
        - MockUserHeader: []
      responses:
        "200":
          description: Imported repositories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepositoryListResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/repositories/{repoId}:
    get:
      tags:
        - Repositories
      operationId: getRepositoryDetail
      summary: Get one imported repository detail
      security:
        - MockUserHeader: []
      parameters:
        - name: repoId
          in: path
          required: true
          description: Repository identifier
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Repository detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepositoryDetailResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/repositories/{repoId}/sync:
    post:
      tags:
        - Repositories
      operationId: triggerRepositorySync
      summary: Enqueue repository initial sync
      security:
        - MockUserHeader: []
      parameters:
        - name: repoId
          in: path
          required: true
          description: Repository identifier
          schema:
            type: string
            format: uuid
      responses:
        "202":
          description: Sync job queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TriggerSyncResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/repositories/{repoId}/memory:
    get:
      tags:
        - Repositories
      operationId: listRepositoryMemory
      summary: List memory entries for a repository
      security:
        - MockUserHeader: []
      parameters:
        - name: repoId
          in: path
          required: true
          description: Repository identifier
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Repository memory entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryEntryListResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/repositories/{repoId}/memory/generate:
    post:
      tags:
        - Repositories
      operationId: generateRepositoryMemory
      summary: Enqueue repository memory generation
      security:
        - MockUserHeader: []
      parameters:
        - name: repoId
          in: path
          required: true
          description: Repository identifier
          schema:
            type: string
            format: uuid
      responses:
        "202":
          description: Memory generation job queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateMemoryResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/repositories/{repoId}/memory/{memoryId}:
    get:
      tags:
        - Repositories
      operationId: getRepositoryMemoryDetail
      summary: Get one repository memory entry detail
      security:
        - MockUserHeader: []
      parameters:
        - name: repoId
          in: path
          required: true
          description: Repository identifier
          schema:
            type: string
            format: uuid
        - name: memoryId
          in: path
          required: true
          description: Memory entry identifier
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Repository memory entry detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryEntryDetailResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/repositories/{repoId}/digests:
    get:
      tags:
        - Repositories
      operationId: listRepositoryDigests
      summary: List weekly digests for a repository
      security:
        - MockUserHeader: []
      parameters:
        - name: repoId
          in: path
          required: true
          description: Repository identifier
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Repository digests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DigestListResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/repositories/{repoId}/digests/generate:
    post:
      tags:
        - Repositories
      operationId: generateRepositoryDigest
      summary: Enqueue weekly digest generation for a repository
      security:
        - MockUserHeader: []
      parameters:
        - name: repoId
          in: path
          required: true
          description: Repository identifier
          schema:
            type: string
            format: uuid
      responses:
        "202":
          description: Digest generation job queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateDigestResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"
components:
  securitySchemes:
    MockUserHeader:
      type: apiKey
      in: header
      name: x-user-id
      description: Required mock auth user identifier.
  responses:
    BadRequestError:
      description: Invalid request payload or parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnauthorizedError:
      description: Missing or invalid auth headers
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ForbiddenError:
      description: Authenticated user is not allowed to access this resource
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ConflictError:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UpstreamError:
      description: Upstream integration failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServiceUnavailableError:
      description: Service is not configured or temporarily unavailable
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - service
        - timestamp
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: api
        timestamp:
          type: string
          format: date-time
          example: 2026-03-06T15:04:05Z
    ErrorDetail:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: unauthorized
        message:
          type: string
          example: missing x-user-id header
        requestId:
          type: string
          example: req_12345
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          $ref: "#/components/schemas/ErrorDetail"
    User:
      type: object
      required:
        - id
        - displayName
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string
        avatarUrl:
          type: string
          format: uri
    Organization:
      type: object
      required:
        - id
        - name
        - slug
        - role
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        role:
          type: string
          enum:
            - owner
            - member
    CreateOrganizationRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 80
    StartGitHubConnectRequest:
      type: object
      properties:
        organizationId:
          type: string
          format: uuid
    StartGitHubConnectData:
      type: object
      required:
        - redirectUrl
      properties:
        redirectUrl:
          type: string
          format: uri
    GitHubConnectionSummary:
      type: object
      required:
        - id
        - githubLogin
        - githubUserId
        - connectedAt
      properties:
        id:
          type: string
          format: uuid
        githubLogin:
          type: string
        githubUserId:
          type: string
        connectedAt:
          type: string
          format: date-time
    GitHubRepository:
      type: object
      required:
        - githubRepoId
        - ownerLogin
        - name
        - fullName
        - private
        - defaultBranch
        - htmlUrl
      properties:
        githubRepoId:
          type: string
        ownerLogin:
          type: string
        name:
          type: string
        fullName:
          type: string
        private:
          type: boolean
        defaultBranch:
          type: string
        htmlUrl:
          type: string
          format: uri
        description:
          type: string
    GitHubRepositoriesListData:
      type: object
      required:
        - repositories
      properties:
        repositories:
          type: array
          items:
            $ref: "#/components/schemas/GitHubRepository"
    ImportedRepository:
      type: object
      required:
        - id
        - organizationId
        - githubRepoId
        - ownerLogin
        - name
        - fullName
        - private
        - defaultBranch
        - htmlUrl
        - importedAt
      properties:
        id:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        githubRepoId:
          type: string
        ownerLogin:
          type: string
        name:
          type: string
        fullName:
          type: string
        private:
          type: boolean
        defaultBranch:
          type: string
        htmlUrl:
          type: string
          format: uri
        description:
          type: string
        importedAt:
          type: string
          format: date-time
    ImportGitHubRepositoriesRequest:
      type: object
      required:
        - organizationId
        - repositories
      properties:
        organizationId:
          type: string
          format: uuid
        repositories:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/GitHubRepository"
    ImportGitHubRepositoriesData:
      type: object
      required:
        - importedRepositories
      properties:
        importedRepositories:
          type: array
          items:
            $ref: "#/components/schemas/ImportedRepository"
    GitHubCallbackSuccessData:
      type: object
      required:
        - connected
        - account
      properties:
        connected:
          type: boolean
          enum: [true]
        account:
          $ref: "#/components/schemas/GitHubConnectionSummary"
    JobPayload:
      type: object
      required:
        - repositoryId
        - organizationId
        - triggeredByUserId
      properties:
        repositoryId:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        triggeredByUserId:
          type: string
          format: uuid
    Job:
      type: object
      required:
        - id
        - jobType
        - status
        - queueName
        - attempts
        - payload
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        jobType:
          type: string
          enum:
            - repo.initial_sync
            - repo.incremental_sync
            - repo.generate_memory
            - repo.generate_digest
            - repo.recalculate_hotspots
        status:
          type: string
          enum:
            - queued
            - running
            - succeeded
            - failed
        queueName:
          type: string
        attempts:
          type: integer
        lastError:
          type: string
          nullable: true
        payload:
          $ref: "#/components/schemas/JobPayload"
        startedAt:
          type: string
          format: date-time
          nullable: true
        finishedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    RepositorySummary:
      type: object
      required:
        - id
        - organizationId
        - githubRepoId
        - ownerLogin
        - name
        - fullName
        - private
        - defaultBranch
        - htmlUrl
        - importedAt
        - pullRequestCount
        - issueCount
        - memoryEntryCount
      properties:
        id:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        githubRepoId:
          type: string
        ownerLogin:
          type: string
        name:
          type: string
        fullName:
          type: string
        private:
          type: boolean
        defaultBranch:
          type: string
        htmlUrl:
          type: string
          format: uri
        description:
          type: string
        importedAt:
          type: string
          format: date-time
        lastSyncStatus:
          type: string
        lastSyncTime:
          type: string
          format: date-time
          nullable: true
        pullRequestCount:
          type: integer
        issueCount:
          type: integer
        memoryEntryCount:
          type: integer
    JobResponseData:
      type: object
      required:
        - job
      properties:
        job:
          $ref: "#/components/schemas/Job"
    OrganizationRepositoriesData:
      type: object
      required:
        - repositories
      properties:
        repositories:
          type: array
          items:
            $ref: "#/components/schemas/RepositorySummary"
    RepositoryDetailData:
      type: object
      required:
        - repository
      properties:
        repository:
          $ref: "#/components/schemas/RepositorySummary"
    TriggerSyncData:
      type: object
      required:
        - jobId
        - status
      properties:
        jobId:
          type: string
          format: uuid
